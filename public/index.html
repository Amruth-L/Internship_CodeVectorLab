<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Browse 200,000 products with fast cursor-based pagination, search, filtering, and sorting.">
  <title>Product Catalog — Browse & Discover</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="index.css">
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="header-inner">
      <div class="logo">
        <svg class="logo-icon" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/>
          <line x1="3" y1="6" x2="21" y2="6"/>
          <path d="M16 10a4 4 0 01-8 0"/>
        </svg>
        <span class="logo-text">ProductVault</span>
      </div>
      <div class="header-stats" id="headerStats">
        <span class="stats-pill">Loading...</span>
      </div>
    </div>
  </header>

  <!-- Main Content -->
  <main class="main">
    <!-- Search & Controls Bar -->
    <section class="controls-section">
      <div class="search-bar">
        <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input
          type="text"
          id="searchInput"
          class="search-input"
          placeholder="Search products by name..."
          autocomplete="off"
        >
        <button id="clearSearch" class="clear-search-btn hidden" aria-label="Clear search">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"/>
            <line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>

      <div class="filter-controls">
        <!-- Category Filter -->
        <div class="control-group">
          <label class="control-label" for="categoryFilter">Category</label>
          <div class="select-wrapper">
            <select id="categoryFilter" class="control-select">
              <option value="">All Categories</option>
            </select>
            <svg class="select-chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="6 9 12 15 18 9"/>
            </svg>
          </div>
        </div>

        <!-- Sort By -->
        <div class="control-group">
          <label class="control-label" for="sortBy">Sort by</label>
          <div class="select-wrapper">
            <select id="sortBy" class="control-select">
              <option value="created_at">Date Added</option>
              <option value="name">Name</option>
              <option value="price">Price</option>
              <option value="updated_at">Last Updated</option>
            </select>
            <svg class="select-chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="6 9 12 15 18 9"/>
            </svg>
          </div>
        </div>

        <!-- Sort Order -->
        <div class="control-group">
          <label class="control-label" for="sortOrder">Order</label>
          <div class="select-wrapper">
            <select id="sortOrder" class="control-select">
              <option value="desc">Descending</option>
              <option value="asc">Ascending</option>
            </select>
            <svg class="select-chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="6 9 12 15 18 9"/>
            </svg>
          </div>
        </div>
      </div>
    </section>

    <!-- Active Filters -->
    <section class="active-filters" id="activeFilters"></section>

    <!-- Products Grid -->
    <section class="products-section">
      <div class="products-grid" id="productsGrid">
        <!-- Products will be rendered here -->
      </div>

      <!-- Loading Skeleton -->
      <div class="skeleton-grid hidden" id="skeletonGrid">
        <div class="skeleton-card"><div class="skeleton-badge"></div><div class="skeleton-title"></div><div class="skeleton-subtitle"></div><div class="skeleton-price"></div></div>
        <div class="skeleton-card"><div class="skeleton-badge"></div><div class="skeleton-title"></div><div class="skeleton-subtitle"></div><div class="skeleton-price"></div></div>
        <div class="skeleton-card"><div class="skeleton-badge"></div><div class="skeleton-title"></div><div class="skeleton-subtitle"></div><div class="skeleton-price"></div></div>
        <div class="skeleton-card"><div class="skeleton-badge"></div><div class="skeleton-title"></div><div class="skeleton-subtitle"></div><div class="skeleton-price"></div></div>
        <div class="skeleton-card"><div class="skeleton-badge"></div><div class="skeleton-title"></div><div class="skeleton-subtitle"></div><div class="skeleton-price"></div></div>
        <div class="skeleton-card"><div class="skeleton-badge"></div><div class="skeleton-title"></div><div class="skeleton-subtitle"></div><div class="skeleton-price"></div></div>
      </div>

      <!-- Empty State -->
      <div class="empty-state hidden" id="emptyState">
        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65"/>
          <line x1="8" y1="11" x2="14" y2="11"/>
        </svg>
        <h2>No products found</h2>
        <p>Try adjusting your search or filter criteria</p>
        <button id="resetFilters" class="reset-btn">Reset All Filters</button>
      </div>

      <!-- Load More -->
      <div class="load-more-container hidden" id="loadMoreContainer">
        <button id="loadMoreBtn" class="load-more-btn">
          <span class="load-more-text">Load More Products</span>
          <svg class="load-more-spinner hidden" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/>
          </svg>
        </button>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
